<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 - Cosmitto Coffee</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <style>
      @font-face {
        font-family: Anton;
        src: url("/assets/fonts/anton-400.ttf") format("truetype");
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #120d0e;
        color: #f3eee9;
        font-family: system-ui, sans-serif;
        padding: 24px;
      }

      main {
        width: min(1180px, 100%);
        border: 2px solid #f3eee9;
        padding: clamp(32px, 5vw, 56px);
        background: #120d0e;
      }

      .eyebrow {
        color: #e61a23;
        font-size: 0.88rem;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-family: Anton, Impact, sans-serif;
        font-size: clamp(4.4rem, 14vw, 10rem);
        line-height: 0.82;
        font-weight: 400;
      }

      h1 span {
        color: #e61a23;
      }

      p {
        max-width: 620px;
        color: rgba(243, 238, 233, 0.82);
        font-size: clamp(1rem, 2vw, 1.22rem);
        line-height: 1.65;
        margin: 24px 0 0;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 36px;
      }

      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #f3eee9;
        color: #f3eee9;
        padding: 0 22px;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-decoration: none;
        text-transform: uppercase;
        transition:
          background-color 120ms steps(2, end),
          color 120ms steps(2, end);
      }

      a:first-child {
        background: #e61a23;
      }

      a:hover,
      a:focus-visible {
        background: #f3eee9;
        color: #120d0e;
        outline: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">404 / LOST IN ORBIT</div>
      <h1>PAGE<br /><span>NOT FOUND.</span></h1>
      <p>This page is not on the Cosmitto map. Go back home or jump straight to the full menu.</p>
      <nav aria-label="404 navigation">
        <a href="/">Back home</a>
        <a href="/menu">View menu</a>
      </nav>
    </main>
  </body>
</html>
